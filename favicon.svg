<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="IT MAKER LC">
  <!-- Favicon: readable "IT" on a navy chip, bordered by a thin train track.
       The track here is drawn as two real concentric rails + ties (NOT the carve
       technique) so it stays crisp on any browser-tab background. Navy fill keeps
       "IT" legible even in light tabs. -->
  <!-- navy chip -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#04060F"/>
  <!-- two rails (outer + inner) -->
  <rect x="6.5" y="6.5" width="51" height="51" rx="10.5" fill="none" stroke="#E8BE3C" stroke-width="1.1"/>
  <rect x="11"  y="11"  width="42" height="42" rx="7"    fill="none" stroke="#E8BE3C" stroke-width="1.1"/>
  <!-- ties: short ticks bridging the two rails on each side (kept clear of corners) -->
  <g stroke="#E8BE3C" stroke-width="1.1">
    <path d="M22 6.5 L22 11 M32 6.5 L32 11 M42 6.5 L42 11"/>
    <path d="M22 53 L22 57.5 M32 53 L32 57.5 M42 53 L42 57.5"/>
    <path d="M6.5 22 L11 22 M6.5 32 L11 32 M6.5 42 L11 42"/>
    <path d="M53 22 L57.5 22 M53 32 L57.5 32 M53 42 L57.5 42"/>
    <path d="M9.6 9.6 L13 13 M54.4 9.6 L51 13 M9.6 54.4 L13 51 M54.4 54.4 L51 51"/>
  </g>
  <!-- IT wordmark -->
  <text x="32" y="40" text-anchor="middle" font-family="ui-monospace,'Cascadia Mono','Courier New',monospace"
        font-size="23" font-weight="700" letter-spacing="1" fill="#F3F6FD">IT</text>
</svg>
